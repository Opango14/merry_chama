<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>ChamaFlow - Merry-Go-Round</title>
        <script src="https://cdn.tailwindcss.com"></script>
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    </head>
    <body class="bg-gray-50 font-sans">
        <nav class="bg-green-700 text-white p-4">
            <div class="max-w-6xl mx-auto flex justify-between items-center">
                <a href="/" class="text-2xl font-bold">ChamaFlow</a>
                {% if user.is_authenticated %}
                    <div class="flex items-center gap-6">
                        <a href="{% url 'dashboard' %}" class="hover:underline">Dashboard</a>
                        <a href="{% url 'create_group' %}" class="hover:underline">Create Chama</a>
                        <span>{{ user.username }}</span>
                        <a href="{% url 'logout' %}" class="bg-white text-green-700 px-4 py-1 rounded-full font-medium">Logout</a>
                    </div>
                {% else %}
                    <div>
                        <a href="{% url 'login' %}" class="mr-4">Login</a>
                        <a href="{% url 'register' %}" class="bg-white text-green-700 px-6 py-2 rounded-full font-medium">Join Free</a>
                    </div>
                {% endif %}
            </div>
        </nav>

        <div class="max-w-6xl mx-auto p-6">
            {% block content %}{% endblock %}
        </div>
    </body>
</html>
