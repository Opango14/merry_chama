{% extends 'base.html' %}

{% block content %}
<div class="max-w-md mx-auto mt-16">
    <div class="bg-white shadow-2xl rounded-3xl p-8">
        <h2 class="text-3xl font-bold text-center mb-8 text-green-700">Welcome Back</h2>

        <form method="POST">
            {% csrf_token %}
            <div class="space-y-6">
                {{ form.as_p }}
            </div>

            <button type="submit" class="mt-8 w-full bg-green-700 hover:bg-green-800 text-white font-semibold py-4 rounded-2xl text-lg transition">Login</button>
        </form>

        <p class="text-center mt-6 text-gray-600">
            Don't have an account?
            <a href="{% url 'register' %}" class="text-green-700 font-medium">Register Here</a>
        </p>
    </div>
</div>
{% endblock %}
